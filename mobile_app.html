<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>N.E.X.U.S</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTi5FLlguVS5TIiwic2hvcnRfbmFtZSI6Ik5FWFVTIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwMDAwMDAiLCJ0aGVtZV9jb2xvciI6IiMwMDAwMDAifQ==">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0; background: #000;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #d0ffe8; height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #passcode-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 16px; padding: 24px;
  }
  #passcode-screen h1 {
    color: #00ff88; font-size: 22px; letter-spacing: 3px; margin-bottom: 8px;
  }
  #passcode-input {
    background: #0a1410; border: 1px solid #00ff8855; color: #00ff88;
    font-size: 24px; text-align: center; letter-spacing: 8px;
    padding: 14px; border-radius: 12px; width: 100%; max-width: 280px;
  }
  #passcode-submit {
    background: #00ff8822; border: 1px solid #00ff88; color: #00ff88;
    padding: 12px 32px; border-radius: 10px; font-size: 16px; width: 100%;
    max-width: 280px;
  }
  #passcode-error { color: #ff5555; font-size: 14px; min-height: 18px; }

  #app-screen { display: none; flex-direction: column; height: 100vh; }
  header {
    padding: 14px 16px; border-bottom: 1px solid #00ff8833;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 16px; color: #00ff88; letter-spacing: 2px; margin: 0; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #555;
  }
  #status-dot.connected { background: #00ff88; }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.4; }
  .msg.user {
    align-self: flex-end; background: #1a3328; color: #d0ffe8;
  }
  .msg.nexus {
    align-self: flex-start; background: #0a1410; color: #00ff88;
    border: 1px solid #00ff8833;
  }
  .msg.pending { opacity: 0.5; font-style: italic; }

  #input-row {
    display: flex; padding: 12px; gap: 8px;
    border-top: 1px solid #00ff8833;
  }
  #text-input {
    flex: 1; background: #0a1410; border: 1px solid #00ff8855;
    color: #d0ffe8; padding: 12px 14px; border-radius: 20px; font-size: 15px;
  }
  #send-btn {
    background: #00ff8822; border: 1px solid #00ff88; color: #00ff88;
    width: 44px; height: 44px; border-radius: 50%; font-size: 18px;
  }
</style>
</head>
<body>

<div id="passcode-screen">
  <h1>N · E · X · U · S</h1>
  <input id="passcode-input" type="password" inputmode="numeric" placeholder="passcode" maxlength="32">
  <button id="passcode-submit">Connect</button>
  <div id="passcode-error"></div>
</div>

<div id="app-screen">
  <header>
    <h1>N.E.X.U.S</h1>
    <div id="status-dot"></div>
  </header>
  <div id="messages"></div>
  <div id="input-row">
    <input id="text-input" type="text" placeholder="Message N.E.X.U.S..." autocomplete="off">
    <button id="send-btn">↑</button>
  </div>
</div>

<script>
// V6.2 Stage A -- Mobile Web App
// Per directive: "this is NOT a second personality, it is the same
// N.E.X.U.S." This app contains zero command logic of its own -- it
// only sends raw text to the relay and displays whatever the REAL
// desktop N.E.X.U.S responds with. No local intelligence, no
// fallback responses, no fabricated continuity if the connection
// drops -- failures are shown honestly, never invented.

const PASSCODE_KEY = "nexus_passcode";
let passcode = localStorage.getItem(PASSCODE_KEY) || "";

const passcodeScreen = document.getElementById("passcode-screen");
const appScreen = document.getElementById("app-screen");
const passcodeInput = document.getElementById("passcode-input");
const passcodeSubmit = document.getElementById("passcode-submit");
const passcodeError = document.getElementById("passcode-error");
const messagesEl = document.getElementById("messages");
const textInput = document.getElementById("text-input");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");

function addMessage(text, role, pending) {
  const div = document.createElement("div");
  div.className = "msg " + role + (pending ? " pending" : "");
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function checkHealth() {
  try {
    const r = await fetch("/health");
    const data = await r.json();
    statusDot.classList.toggle("connected", data.desktop_connected);
  } catch (e) {
    statusDot.classList.remove("connected");
  }
}

async function verifyPasscode(code) {
  try {
    const r = await fetch("/phone/send", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-nexus-passcode": code },
      body: JSON.stringify({ text: "__connection_test__" }),
    });
    return r.status !== 401;
  } catch (e) {
    return false;
  }
}

async function enterApp() {
  passcodeScreen.style.display = "none";
  appScreen.style.display = "flex";
  checkHealth();
  setInterval(checkHealth, 15000);
  textInput.focus();
}

passcodeSubmit.onclick = async () => {
  const code = passcodeInput.value.trim();
  if (!code) return;
  passcodeError.textContent = "Connecting...";
  const ok = await verifyPasscode(code);
  if (ok) {
    passcode = code;
    localStorage.setItem(PASSCODE_KEY, code);
    enterApp();
  } else {
    passcodeError.textContent = "Incorrect passcode, or relay unreachable.";
  }
};

passcodeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") passcodeSubmit.click();
});

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = "";
  addMessage(text, "user");

  const pendingEl = addMessage("...", "nexus", true);

  try {
    const sendResp = await fetch("/phone/send", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-nexus-passcode": passcode },
      body: JSON.stringify({ text: text }),
    });

    if (sendResp.status === 401) {
      pendingEl.textContent = "Session expired, Sir. Please reconnect.";
      pendingEl.classList.remove("pending");
      localStorage.removeItem(PASSCODE_KEY);
      setTimeout(() => location.reload(), 2000);
      return;
    }

    const { request_id } = await sendResp.json();

    // Poll for the REAL response -- never fabricate one locally.
    // Honest timeout if the desktop never picks it up (e.g. desktop
    // N.E.X.U.S isn't running right now).
    let attempts = 0;
    const maxAttempts = 40; // ~40 seconds
    const poll = async () => {
      attempts++;
      const pollResp = await fetch(`/phone/poll/${request_id}`, {
        headers: { "x-nexus-passcode": passcode },
      });
      const data = await pollResp.json();
      if (data.ready) {
        pendingEl.textContent = data.text;
        pendingEl.classList.remove("pending");
      } else if (attempts >= maxAttempts) {
        pendingEl.textContent = "No response, Sir. Desktop N.E.X.U.S may be offline.";
        pendingEl.classList.remove("pending");
      } else {
        setTimeout(poll, 1000);
      }
    };
    poll();
  } catch (e) {
    pendingEl.textContent = "Connection error, Sir.";
    pendingEl.classList.remove("pending");
  }
}

sendBtn.onclick = sendMessage;
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// Auto-reconnect if a passcode was already saved
if (passcode) {
  verifyPasscode(passcode).then((ok) => {
    if (ok) enterApp();
    else localStorage.removeItem(PASSCODE_KEY);
  });
}
</script>
</body>
</html>
